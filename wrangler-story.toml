# wrangler-story.toml — Method B shadow worker (pitchos-story-agent).
#
# Separate RUNTIME, shared CODE: this worker imports the same ./src/*.js modules
# as the legacy worker (firewall.js, story-matcher.js, utils.js) and reads the same
# Supabase tables + KV namespace. The split isolates cron rhythm, CPU/subrequest
# budget, failure domain, and deploy lifecycle — NOT the codebase. See docs/method-b-design.md §5.
#
# Deploy:  npx wrangler deploy -c wrangler-story.toml
# Secrets: npx wrangler secret put SUPABASE_SERVICE_KEY -c wrangler-story.toml
#          npx wrangler secret put ANTHROPIC_API_KEY    -c wrangler-story.toml
#
# Inert by default: runMethodB() no-ops unless KV flag `methodb:enabled` == "1".

name = "pitchos-story-agent"
main = "worker-story-agent.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Shared KV namespace (same id as the legacy worker) — both workers see the same keys.
[[kv_namespaces]]
binding = "PITCHOS_CACHE"
id = "dedaea653ed542cca25e6cc2551dd1c3"

[vars]
SUPABASE_URL = "https://qfgstxswcsodaaksjztz.supabase.co"
MONTHLY_CLAUDE_CAP = "16"

[limits]
subrequests = 1000

# Own cadence: hourly, not the legacy 5-min fetch tick. Method B correlation/synthesis
# does not need freshness polling — it reacts to already-ingested content_items.
[triggers]
crons = ["0 * * * *"]

# No public routes — this worker is a PRODUCER only. The legacy worker keeps serving
# pages from KV behind the blue/green `pipeline:active` pointer (design §7).
