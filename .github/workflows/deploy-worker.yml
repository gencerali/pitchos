name: Deploy

# Deploys the main worker (pitchos-fetch-agent) and the Pages site
# whenever code lands on main, or on demand via "Run workflow".
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   PITCHOS_DEPLOY  — Cloudflare API token with Workers + Pages Edit permissions

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy pitchos-fetch-agent (Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          command: deploy

      - name: Deploy pitchos (Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          command: pages deploy . --project-name=pitchos --branch=main
