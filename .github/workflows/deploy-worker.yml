name: Deploy Worker

# Deploys the main worker (pitchos-fetch-agent) whenever code lands on main,
# or on demand via the "Run workflow" button (works from a phone).
# The homepage/static site is deployed separately by Cloudflare Pages' own
# git integration — this workflow only handles the worker.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token from the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy pitchos-fetch-agent
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
