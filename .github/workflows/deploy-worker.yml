name: Deploy

# Deploys the main worker (pitchos-fetch-agent), the Pages site,
# and the bot-cron worker whenever code lands on main, or on demand.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   PITCHOS_DEPLOY    — Cloudflare API token with Workers + Pages Edit permissions
#   XP_TOKEN_SECRET   — shared secret for bot-cron → /api/bot/tick auth
#   SETTLE_SECRET     — shared secret for weekly league settle trigger
#                       Must also be set in Cloudflare Pages env vars (dashboard)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy pitchos-fetch-agent (Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          command: deploy
          secrets: |
            SETTLE_SECRET
        env:
          SETTLE_SECRET: ${{ secrets.SETTLE_SECRET }}

      - name: Deploy pitchos (Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          command: pages deploy . --project-name=pitchos --branch=main

      - name: Deploy pitchos-story-agent (Method B Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          command: deploy -c wrangler-story.toml

      - name: Deploy pitchos-bot-cron (Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.PITCHOS_DEPLOY }}
          wranglerVersion: '4.80.0'
          workingDirectory: workers/bot-cron
          command: deploy
          secrets: |
            XP_TOKEN_SECRET
        env:
          XP_TOKEN_SECRET: ${{ secrets.XP_TOKEN_SECRET }}
