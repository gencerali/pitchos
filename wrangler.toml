name = "pitchos-fetch-agent"
main = "worker-fetch-agent.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "PITCHOS_CACHE"
id = "dedaea653ed542cca25e6cc2551dd1c3"

[vars]
SUPABASE_URL = "https://qfgstxswcsodaaksjztz.supabase.co"
MONTHLY_CLAUDE_CAP = "8"

[limits]
subrequests = 1000

[triggers]
crons = ["*/5 * * * *", "0 */2 * * *", "0 4 * * *", "0 3 * * 1"]

[[routes]]
pattern = "app.kartalix.com/haber/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/rss"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/sitemap.xml"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/admin"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/admin/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/article/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/react"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/comments"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/cache"
zone_name = "kartalix.com"

[[routes]]
pattern = "app.kartalix.com/widgets/*"
zone_name = "kartalix.com"