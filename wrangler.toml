name = "pitchos-fetch-agent"
main = "worker-fetch-agent.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "PITCHOS_CACHE"
id = "dedaea653ed542cca25e6cc2551dd1c3"

[vars]
SUPABASE_URL = "https://qfgstxswcsodaaksjztz.supabase.co"
MONTHLY_CLAUDE_CAP = "100"

[limits]
subrequests = 1000

[triggers]
crons = ["*/5 * * * *", "0 */3 * * *", "0 4 * * *", "0 3 * * 1", "0 2 * * 7"]
# Bot cron is handled by workers/bot-cron — separate tiny worker, not this one.

