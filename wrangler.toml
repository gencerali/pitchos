name = "pitchos-fetch-agent"
main = "worker-fetch-agent.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "PITCHOS_CACHE"
id = "dedaea653ed542cca25e6cc2551dd1c3"

[vars]
SUPABASE_URL = "https://qfgstxswcsodaaksjztz.supabase.co"
MONTHLY_CLAUDE_CAP = "8"

[limits]
subrequests = 1000

[triggers]
crons = ["*/5 * * * *", "0 */1 * * *", "0 4 * * *", "0 3 * * 1", "0 2 * * 7"]

[[routes]]
pattern = "kartalix.com/haber/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/rss"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/sitemap.xml"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/admin"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/admin/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/article/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/react"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/comments"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/cache"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/widgets/*"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/hakkimizda"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/impressum"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/iletisim"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/gizlilik"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/kaynak-atif"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/run"
zone_name = "kartalix.com"

[[routes]]
pattern = "kartalix.com/force-cache"
zone_name = "kartalix.com"